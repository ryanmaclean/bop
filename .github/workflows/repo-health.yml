name: Repo Health

on:
  pull_request:
  push:
    branches: [main]

jobs:
  health:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and quality gates
        run: make check

      - name: Install Nushell
        run: brew install nushell

      - name: Policy check (staged scope)
        run: nu scripts/policy_check.nu --staged --cards-dir .cards
