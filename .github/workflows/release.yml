name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: make check

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/bop dist/bop-aarch64-apple-darwin
          cd dist && tar czf bop-aarch64-apple-darwin.tar.gz bop-aarch64-apple-darwin
          shasum -a 256 bop-aarch64-apple-darwin.tar.gz > bop-aarch64-apple-darwin.tar.gz.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "bop $TAG_NAME" \
            --generate-notes \
            dist/bop-aarch64-apple-darwin.tar.gz \
            dist/bop-aarch64-apple-darwin.tar.gz.sha256
