# JobCard GitLab CI Template
#
# Usage: include this template in your .gitlab-ci.yml:
#
#   include:
#     - project: 'your-org/jobcard'
#       file: '.gitlab/ci-templates/jobcard.yml'
#
# Then use the hidden jobs as extends targets:
#
#   create-ai-job:
#     extends: .jobcard-create
#     variables:
#       JOBCARD_TEMPLATE: implement
#       JOBCARD_SPEC: "Add OAuth2 login to the user service"
#
# Prerequisites:
#   - A self-hosted GitLab runner with the JobCard daemon running
#   - JOBCARD_API_URL CI/CD variable set to http://<runner-host>:8765
#   - jq and curl available on the runner image

# ── Variables ─────────────────────────────────────────────────────────────────

variables:
  JOBCARD_API_URL:
    value: "http://127.0.0.1:8765"
    description: "Base URL of the JobCard REST API server"
  JOBCARD_POLL_INTERVAL:
    value: "15"
    description: "Seconds between status polls"
  JOBCARD_TIMEOUT_MINUTES:
    value: "60"
    description: "Maximum minutes to wait for job completion"

# ── Hidden job: create ────────────────────────────────────────────────────────

.jobcard-create:
  # Variables to set in the extending job:
  #   JOBCARD_TEMPLATE        (required) template name, e.g. "implement"
  #   JOBCARD_JOB_ID          (optional) override job ID; auto-generated if unset
  #   JOBCARD_SPEC            (optional) spec text written to spec.md
  #   JOBCARD_ACCEPTANCE_JSON (optional) JSON array of acceptance criteria strings
  variables:
    JOBCARD_TEMPLATE: implement
    JOBCARD_JOB_ID: ""
    JOBCARD_SPEC: ""
    JOBCARD_ACCEPTANCE_JSON: "[]"
  script:
    - |
      if [ -z "$JOBCARD_JOB_ID" ]; then
        JOBCARD_JOB_ID="ci-${CI_PIPELINE_ID}-${CI_JOB_ID}"
      fi
      export JOBCARD_JOB_ID

      PAYLOAD=$(jq -n \
        --arg template "$JOBCARD_TEMPLATE" \
        --arg id       "$JOBCARD_JOB_ID" \
        --arg spec     "$JOBCARD_SPEC" \
        --argjson ac   "$JOBCARD_ACCEPTANCE_JSON" \
        '{template:$template, id:$id, spec:$spec, acceptance_criteria:$ac}')

      HTTP_CODE=$(curl -sf -o /tmp/jc-create.json -w "%{http_code}" \
        -X POST "${JOBCARD_API_URL}/jobs" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")

      cat /tmp/jc-create.json

      if [ "$HTTP_CODE" != "201" ]; then
        echo "ERROR: JobCard API returned HTTP $HTTP_CODE"
        exit 1
      fi

      echo "JOBCARD_JOB_ID=$JOBCARD_JOB_ID" >> jobcard.env
      echo "Created job: $JOBCARD_JOB_ID"
  artifacts:
    reports:
      dotenv: jobcard.env

# ── Hidden job: wait ──────────────────────────────────────────────────────────

.jobcard-wait:
  # Depends on a prior .jobcard-create job that exports JOBCARD_JOB_ID via dotenv.
  script:
    - |
      DEADLINE=$(( $(date +%s) + JOBCARD_TIMEOUT_MINUTES * 60 ))
      echo "Waiting for job: $JOBCARD_JOB_ID"

      while true; do
        NOW=$(date +%s)
        if [ "$NOW" -ge "$DEADLINE" ]; then
          echo "ERROR: Timed out after ${JOBCARD_TIMEOUT_MINUTES}m waiting for $JOBCARD_JOB_ID"
          exit 1
        fi

        HTTP_CODE=$(curl -sf -o /tmp/jc-status.json -w "%{http_code}" \
          "${JOBCARD_API_URL}/jobs/${JOBCARD_JOB_ID}")

        if [ "$HTTP_CODE" != "200" ]; then
          echo "WARNING: Status poll returned HTTP $HTTP_CODE — retrying"
          sleep "$JOBCARD_POLL_INTERVAL"
          continue
        fi

        STATE=$(jq -r '.job.state' /tmp/jc-status.json)
        echo "Job $JOBCARD_JOB_ID state: $STATE"

        case "$STATE" in
          done|merged)
            echo "Job completed successfully (state: $STATE)"
            exit 0
            ;;
          failed)
            REASON=$(jq -r '.job.failure_reason // "unknown"' /tmp/jc-status.json)
            echo "ERROR: Job $JOBCARD_JOB_ID failed: $REASON"
            exit 1
            ;;
          pending|running)
            sleep "$JOBCARD_POLL_INTERVAL"
            ;;
          *)
            echo "WARNING: Unexpected state '$STATE' — retrying"
            sleep "$JOBCARD_POLL_INTERVAL"
            ;;
        esac
      done

# ── Hidden job: get output ────────────────────────────────────────────────────

.jobcard-output:
  # Depends on a prior .jobcard-create job that exports JOBCARD_JOB_ID via dotenv.
  # Writes output files to $JOBCARD_OUTPUT_DIR (default: jobcard-output/).
  variables:
    JOBCARD_OUTPUT_DIR: jobcard-output
  script:
    - |
      mkdir -p "$JOBCARD_OUTPUT_DIR"

      HTTP_CODE=$(curl -sf -o /tmp/jc-output.json -w "%{http_code}" \
        "${JOBCARD_API_URL}/jobs/${JOBCARD_JOB_ID}/output")

      if [ "$HTTP_CODE" != "200" ]; then
        echo "ERROR: Output API returned HTTP $HTTP_CODE"
        cat /tmp/jc-output.json
        exit 1
      fi

      jq -r '.files | to_entries[] | "\(.key)\t\(.value)"' /tmp/jc-output.json \
        | while IFS=$'\t' read -r name content; do
            dir=$(dirname "$JOBCARD_OUTPUT_DIR/$name")
            mkdir -p "$dir"
            printf '%s' "$content" > "$JOBCARD_OUTPUT_DIR/$name"
            echo "Wrote: $JOBCARD_OUTPUT_DIR/$name"
          done

      echo "Output files written to $JOBCARD_OUTPUT_DIR"
  artifacts:
    paths:
      - jobcard-output/
    expire_in: 7 days

# ── Convenience combined job ──────────────────────────────────────────────────

.jobcard-run:
  # All-in-one: create, wait, then fetch output in a single job.
  variables:
    JOBCARD_TEMPLATE: implement
    JOBCARD_JOB_ID: ""
    JOBCARD_SPEC: ""
    JOBCARD_ACCEPTANCE_JSON: "[]"
    JOBCARD_OUTPUT_DIR: jobcard-output
  script:
    - |
      # 1. Create
      if [ -z "$JOBCARD_JOB_ID" ]; then
        JOBCARD_JOB_ID="ci-${CI_PIPELINE_ID}-${CI_JOB_ID}"
      fi

      PAYLOAD=$(jq -n \
        --arg template "$JOBCARD_TEMPLATE" \
        --arg id       "$JOBCARD_JOB_ID" \
        --arg spec     "$JOBCARD_SPEC" \
        --argjson ac   "$JOBCARD_ACCEPTANCE_JSON" \
        '{template:$template, id:$id, spec:$spec, acceptance_criteria:$ac}')

      HTTP_CODE=$(curl -sf -o /tmp/jc-create.json -w "%{http_code}" \
        -X POST "${JOBCARD_API_URL}/jobs" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")

      if [ "$HTTP_CODE" != "201" ]; then
        echo "ERROR: Create returned HTTP $HTTP_CODE"; cat /tmp/jc-create.json; exit 1
      fi
      echo "Created job: $JOBCARD_JOB_ID"

      # 2. Wait
      DEADLINE=$(( $(date +%s) + JOBCARD_TIMEOUT_MINUTES * 60 ))
      while true; do
        [ "$(date +%s)" -ge "$DEADLINE" ] && echo "ERROR: timeout" && exit 1
        HTTP_CODE=$(curl -sf -o /tmp/jc-status.json -w "%{http_code}" \
          "${JOBCARD_API_URL}/jobs/${JOBCARD_JOB_ID}")
        STATE=$(jq -r '.job.state' /tmp/jc-status.json 2>/dev/null || echo "unknown")
        echo "State: $STATE"
        case "$STATE" in
          done|merged) break ;;
          failed)
            REASON=$(jq -r '.job.failure_reason // "unknown"' /tmp/jc-status.json)
            echo "ERROR: Job failed: $REASON"; exit 1 ;;
          *) sleep "$JOBCARD_POLL_INTERVAL" ;;
        esac
      done

      # 3. Fetch output
      mkdir -p "$JOBCARD_OUTPUT_DIR"
      curl -sf "${JOBCARD_API_URL}/jobs/${JOBCARD_JOB_ID}/output" \
        | jq -r '.files | to_entries[] | "\(.key)\t\(.value)"' \
        | while IFS=$'\t' read -r name content; do
            mkdir -p "$(dirname "$JOBCARD_OUTPUT_DIR/$name")"
            printf '%s' "$content" > "$JOBCARD_OUTPUT_DIR/$name"
            echo "Wrote: $JOBCARD_OUTPUT_DIR/$name"
          done
  artifacts:
    paths:
      - jobcard-output/
    expire_in: 7 days
