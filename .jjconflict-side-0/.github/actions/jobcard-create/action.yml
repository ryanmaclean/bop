name: JobCard Create
description: Create a JobCard job via the REST API and output the job ID.

branding:
  icon: zap
  color: blue

inputs:
  api-url:
    description: Base URL of the JobCard API server (e.g. http://runner:8765)
    required: true
  template:
    description: Template name to use (must exist in .cards/templates/)
    required: true
  job-id:
    description: >
      Unique job identifier. Defaults to a timestamp-based slug if not provided.
    required: false
    default: ''
  spec:
    description: Job specification text written to spec.md
    required: false
    default: ''
  acceptance-criteria:
    description: >
      JSON array of acceptance-criteria strings, e.g.
      '["Tests pass","Linter clean"]'
    required: false
    default: '[]'

outputs:
  job-id:
    description: The job ID created by the API
    value: ${{ steps.create.outputs.job-id }}

runs:
  using: composite
  steps:
    - name: Resolve job ID
      id: resolve-id
      shell: bash
      run: |
        if [ -n "${{ inputs.job-id }}" ]; then
          echo "job-id=${{ inputs.job-id }}" >> "$GITHUB_OUTPUT"
        else
          echo "job-id=ci-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Create job
      id: create
      shell: bash
      env:
        JOB_ID: ${{ steps.resolve-id.outputs.job-id }}
      run: |
        PAYLOAD=$(jq -n \
          --arg template "${{ inputs.template }}" \
          --arg id "$JOB_ID" \
          --arg spec "${{ inputs.spec }}" \
          --argjson ac '${{ inputs.acceptance-criteria }}' \
          '{template: $template, id: $id, spec: $spec, acceptance_criteria: $ac}')

        HTTP_CODE=$(curl -s -o /tmp/jc-create-response.json -w "%{http_code}" \
          -X POST "${{ inputs.api-url }}/jobs" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        cat /tmp/jc-create-response.json

        if [ "$HTTP_CODE" != "201" ]; then
          echo "::error::JobCard API returned HTTP $HTTP_CODE"
          exit 1
        fi

        CREATED_ID=$(jq -r '.job.id // .id' /tmp/jc-create-response.json)
        echo "job-id=$CREATED_ID" >> "$GITHUB_OUTPUT"
        echo "Created job: $CREATED_ID"
