# cargo-deny configuration
# Everything not in the allow list is denied by default (cargo-deny >= 0.14).
# GPL/LGPL/AGPL are blocked by omission — they are not in the allow list.

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unlicense",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "OpenSSL",
  "MPL-2.0",  # Mozilla Public License 2.0 — weak copyleft (file-level), not GPL
]

[bans]
# No explicit bans needed — license check handles this.
deny = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
