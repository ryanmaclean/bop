name: JobCard Output
description: Retrieve job output artifacts and make them available as step outputs and workspace files.

branding:
  icon: download
  color: blue

inputs:
  api-url:
    description: Base URL of the JobCard API server (e.g. http://runner:8765)
    required: true
  job-id:
    description: Job ID to fetch output for
    required: true
  output-dir:
    description: Directory in the workspace to write output files into
    required: false
    default: jobcard-output

outputs:
  files-json:
    description: JSON object mapping filename → content for all output files
    value: ${{ steps.fetch.outputs.files-json }}
  stdout-log:
    description: Contents of stdout.log
    value: ${{ steps.fetch.outputs.stdout-log }}

runs:
  using: composite
  steps:
    - name: Fetch output
      id: fetch
      shell: bash
      run: |
        JOB_ID="${{ inputs.job-id }}"
        API_URL="${{ inputs.api-url }}"
        OUT_DIR="${{ inputs.output-dir }}"

        HTTP_CODE=$(curl -s -o /tmp/jc-output.json -w "%{http_code}" \
          "$API_URL/jobs/$JOB_ID/output")

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::JobCard output API returned HTTP $HTTP_CODE"
          cat /tmp/jc-output.json
          exit 1
        fi

        mkdir -p "$OUT_DIR"

        # Write each file to the output directory
        jq -r '.files | to_entries[] | "\(.key)\t\(.value)"' /tmp/jc-output.json \
          | while IFS=$'\t' read -r name content; do
              dir=$(dirname "$OUT_DIR/$name")
              mkdir -p "$dir"
              printf '%s' "$content" > "$OUT_DIR/$name"
              echo "Wrote: $OUT_DIR/$name"
            done

        # Export files JSON as an output (truncated to 64 KB for GitHub limits)
        FILES_JSON=$(jq -c '.files' /tmp/jc-output.json | head -c 65536)
        echo "files-json=$FILES_JSON" >> "$GITHUB_OUTPUT"

        # Export stdout log separately for convenience
        STDOUT=$(jq -r '.files["logs/stdout.log"] // ""' /tmp/jc-output.json | head -c 65536)
        {
          echo "stdout-log<<JOBCARD_EOF"
          echo "$STDOUT"
          echo "JOBCARD_EOF"
        } >> "$GITHUB_OUTPUT"

        echo "Output files written to $OUT_DIR"

    - name: Upload output as artifact
      uses: actions/upload-artifact@v4
      with:
        name: jobcard-output-${{ inputs.job-id }}
        path: ${{ inputs.output-dir }}
        if-no-files-found: warn
